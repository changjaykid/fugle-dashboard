<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>老闆主控版｜台股智能盯盤</title>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3a;
    --text: #e8e8f0;
    --text-muted: #6a6a8a;
    --accent: #7c6fff;
    --green: #00c853;
    --red: #ff4444;
    --yellow: #ffd740;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'PingFang TC', sans-serif;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo { font-size: 18px; font-weight: 700; letter-spacing: 1px; }
  .logo span { color: var(--accent); }
  .market-badge {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; color: var(--text-muted);
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--red);
    animation: none;
  }
  .dot.open { background: var(--green); animation: pulse 1.5s infinite; }
  @keyframes pulse {
    0%, 100% { opacity: 1; } 50% { opacity: 0.4; }
  }
  .update-time { font-size: 12px; color: var(--text-muted); }

  /* ── Layout ── */
  .container { max-width: 1400px; margin: 0 auto; padding: 24px; }

  /* ── Tabs ── */
  .tabs {
    display: flex; gap: 4px;
    background: var(--surface);
    border-radius: var(--radius);
    padding: 4px;
    margin-bottom: 24px;
    width: fit-content;
  }
  .tab {
    padding: 8px 20px; border-radius: 8px;
    border: none; background: none;
    color: var(--text-muted); cursor: pointer;
    font-size: 14px; font-weight: 500;
    transition: all .2s;
  }
  .tab.active { background: var(--accent); color: #fff; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* ── Cards grid ── */
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; }
  .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
  @media (max-width: 900px) { .grid-3 { grid-template-columns: 1fr 1fr; } }
  @media (max-width: 600px) { .grid-3, .grid-2 { grid-template-columns: 1fr; } }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }
  .card-title {
    font-size: 12px; font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 1px;
    margin-bottom: 12px;
  }

  /* ── Stock card ── */
  .stock-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    transition: border-color .2s;
    position: relative;
    overflow: hidden;
  }
  .stock-card:hover { border-color: var(--accent); }
  .stock-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
  }
  .stock-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  .stock-name { font-weight: 700; font-size: 16px; }
  .stock-symbol { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .stock-category {
    font-size: 11px; padding: 3px 8px;
    border-radius: 20px; background: var(--surface2);
    color: var(--text-muted);
  }
  .stock-price { font-size: 28px; font-weight: 800; margin: 8px 0; }
  .stock-change { font-size: 14px; }
  .up { color: var(--red); }    /* 台股漲是紅色 */
  .down { color: var(--green); } /* 跌是綠色 */
  .flat { color: var(--text-muted); }

  /* ── Confidence meter ── */
  .confidence-section { margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); }
  .confidence-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .confidence-score { font-size: 24px; font-weight: 800; }
  .confidence-label { font-size: 12px; }
  .confidence-bar {
    height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden;
  }
  .confidence-fill {
    height: 100%; border-radius: 3px;
    transition: width 1s ease;
  }
  .confidence-breakdown {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 6px; margin-top: 10px;
  }
  .breakdown-item {
    display: flex; justify-content: space-between;
    font-size: 11px; color: var(--text-muted);
  }

  /* ── Stock list table ── */
  .stock-table { width: 100%; border-collapse: collapse; }
  .stock-table th {
    text-align: left; font-size: 11px; font-weight: 600;
    color: var(--text-muted); padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    text-transform: uppercase;
  }
  .stock-table td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 14px; }
  .stock-table tr:hover td { background: var(--surface2); }
  .stock-table tr:last-child td { border-bottom: none; }

  /* ── News ── */
  .news-item {
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
  }
  .news-item:last-child { border-bottom: none; }
  .news-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
  .news-meta { font-size: 12px; color: var(--text-muted); display: flex; gap: 12px; }
  .news-tag {
    font-size: 11px; padding: 2px 8px; border-radius: 20px;
    background: rgba(124,111,255,0.15); color: var(--accent);
  }

  /* ── Sector search ── */
  .search-box {
    display: flex; gap: 8px; margin-bottom: 20px;
  }
  .search-input {
    flex: 1; background: var(--surface);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 16px; color: var(--text); font-size: 14px;
  }
  .search-input:focus { outline: none; border-color: var(--accent); }
  .search-btn {
    background: var(--accent); color: #fff;
    border: none; border-radius: 8px; padding: 10px 20px;
    cursor: pointer; font-size: 14px; font-weight: 600;
  }
  .search-btn:hover { opacity: 0.85; }

  /* ── Sector tags ── */
  .sector-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
  .sector-tag {
    padding: 6px 14px; border-radius: 20px;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--text-muted); cursor: pointer; font-size: 13px;
    transition: all .2s;
  }
  .sector-tag:hover, .sector-tag.active {
    border-color: var(--accent); color: var(--accent);
    background: rgba(124,111,255,0.1);
  }

  /* ── Empty state ── */
  .empty {
    text-align: center; padding: 60px 20px;
    color: var(--text-muted);
  }
  .empty-icon { font-size: 48px; margin-bottom: 16px; }
  .empty-text { font-size: 15px; margin-bottom: 8px; }
  .empty-hint { font-size: 13px; opacity: 0.7; }
</style>
</head>
<body>

<header>
  <div class="logo">老闆<span>主控版</span> 🖤</div>
  <div style="display:flex;align-items:center;gap:20px">
    <div class="market-badge">
      <div class="dot" id="marketDot"></div>
      <span id="marketStatus">休市中</span>
    </div>
    <div class="update-time" id="updateTime">—</div>
  </div>
</header>

<div class="container">
  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" onclick="showTab('watchlist')">📊 自選股</button>
    <button class="tab" onclick="showTab('sector')">🔍 類股分析</button>
    <button class="tab" onclick="showTab('news')">📰 新聞雷達</button>
  </div>

  <!-- ① 自選股 -->
  <div class="tab-content active" id="tab-watchlist">
    <div id="stockCards" class="grid-3">
      <div class="empty" style="grid-column:1/-1">
        <div class="empty-icon">📈</div>
        <div class="empty-text">尚無追蹤股票</div>
        <div class="empty-hint">跟老闆說「幫我追蹤 2330」就會出現</div>
      </div>
    </div>

    <!-- 持倉概覽 -->
    <div class="card" style="margin-top:8px">
      <div class="card-title">📋 全部自選股列表</div>
      <table class="stock-table" id="stockTable">
        <thead>
          <tr>
            <th>代號</th>
            <th>名稱</th>
            <th>類別</th>
            <th>現價</th>
            <th>漲跌%</th>
            <th>信心分</th>
            <th>更新</th>
          </tr>
        </thead>
        <tbody id="stockTableBody">
          <tr><td colspan="7" style="text-align:center;color:var(--text-muted);padding:30px">尚無資料</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- ② 類股分析 -->
  <div class="tab-content" id="tab-sector">
    <div class="card" style="margin-bottom:20px">
      <div class="card-title">🔍 類股 / 主題搜尋</div>
      <div class="search-box">
        <input class="search-input" id="sectorInput" placeholder="輸入主題，例如：低軌衛星、AI伺服器、半導體..." />
        <button class="search-btn" onclick="searchSector()">分析</button>
      </div>
      <div class="sector-tags">
        <div class="sector-tag" onclick="quickSector('低軌衛星')">🛰 低軌衛星</div>
        <div class="sector-tag" onclick="quickSector('AI伺服器')">🤖 AI伺服器</div>
        <div class="sector-tag" onclick="quickSector('半導體')">⚡ 半導體</div>
        <div class="sector-tag" onclick="quickSector('電動車')">🚗 電動車</div>
        <div class="sector-tag" onclick="quickSector('ETF')">📦 ETF</div>
      </div>
    </div>
    <div id="sectorResult">
      <div class="empty">
        <div class="empty-icon">🔍</div>
        <div class="empty-text">輸入主題開始分析</div>
        <div class="empty-hint">或直接跟老闆說「低軌衛星供應鏈有哪些台廠？」</div>
      </div>
    </div>
  </div>

  <!-- ③ 新聞 -->
  <div class="tab-content" id="tab-news">
    <div class="grid-2">
      <div class="card">
        <div class="card-title">🔥 今日熱門新聞</div>
        <div id="newsList">
          <div class="empty" style="padding:30px 0">
            <div class="empty-text">每日 8:30 自動更新</div>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-title">⚠️ 對持股的影響</div>
        <div id="newsImpact">
          <div class="empty" style="padding:30px 0">
            <div class="empty-text">有追蹤股票後自動分析</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const DASHBOARD_URL = './dashboard.json';

// ── Tab 切換 ──
function showTab(name) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    const tabs = ['watchlist','sector','news'];
    t.classList.toggle('active', tabs[i] === name);
  });
  document.querySelectorAll('.tab-content').forEach(c => {
    c.classList.toggle('active', c.id === 'tab-' + name);
  });
}

// ── 載入 dashboard.json ──
async function loadDashboard() {
  try {
    const r = await fetch(DASHBOARD_URL + '?t=' + Date.now());
    const data = await r.json();
    renderStocks(data.stocks || []);
    updateHeader(data);
  } catch(e) {
    console.error('載入失敗:', e);
  }
}

function updateHeader(data) {
  const open = data.marketOpen;
  document.getElementById('marketDot').className = 'dot' + (open ? ' open' : '');
  document.getElementById('marketStatus').textContent = open ? '開盤中' : '休市中';
  if (data.updatedAt) {
    const d = new Date(data.updatedAt);
    document.getElementById('updateTime').textContent =
      '更新 ' + d.toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit'});
  }
}

function renderStocks(stocks) {
  // Cards
  const cardsEl = document.getElementById('stockCards');
  if (!stocks.length) {
    cardsEl.innerHTML = `<div class="empty" style="grid-column:1/-1">
      <div class="empty-icon">📈</div>
      <div class="empty-text">尚無追蹤股票</div>
      <div class="empty-hint">跟老闆說「幫我追蹤 2330」就會出現</div>
    </div>`;
  } else {
    cardsEl.innerHTML = stocks.map(s => {
      const dir = s.changePct > 0 ? 'up' : s.changePct < 0 ? 'down' : 'flat';
      const sign = s.changePct > 0 ? '+' : '';
      const barColor = s.confidenceColor || '#7c6fff';
      return `<div class="stock-card">
        <div style="position:absolute;top:0;left:0;right:0;height:3px;background:${barColor}"></div>
        <div class="stock-header">
          <div>
            <div class="stock-name">${s.name || s.symbol}</div>
            <div class="stock-symbol">${s.symbol} · ${s.category || '—'}</div>
          </div>
          <div class="stock-category">${s.category || '—'}</div>
        </div>
        <div class="stock-price ${dir}">$${s.price || '—'}</div>
        <div class="stock-change ${dir}">${sign}${s.changePct || 0}% (${sign}${s.change || 0})</div>
        <div class="confidence-section">
          <div class="confidence-header">
            <div>
              <div class="confidence-score" style="color:${barColor}">${s.confidence}</div>
              <div class="confidence-label" style="color:${barColor}">${s.confidenceLabel}</div>
            </div>
            <div style="font-size:11px;color:var(--text-muted)">信心分</div>
          </div>
          <div class="confidence-bar">
            <div class="confidence-fill" style="width:${s.confidence}%;background:${barColor}"></div>
          </div>
          <div class="confidence-breakdown">
            <div class="breakdown-item"><span>技術面</span><span>—</span></div>
            <div class="breakdown-item"><span>籌碼面</span><span>—</span></div>
            <div class="breakdown-item"><span>話題熱度</span><span>${s.newsScore || '—'}</span></div>
            <div class="breakdown-item"><span>法人動向</span><span>—</span></div>
          </div>
        </div>
        <div style="margin-top:10px;font-size:11px;color:var(--text-muted)">更新 ${s.updatedAt || '—'}</div>
      </div>`;
    }).join('');
  }

  // Table
  const tbody = document.getElementById('stockTableBody');
  if (!stocks.length) {
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--text-muted);padding:30px">尚無資料</td></tr>';
  } else {
    tbody.innerHTML = stocks.map(s => {
      const dir = s.changePct > 0 ? 'up' : s.changePct < 0 ? 'down' : 'flat';
      const sign = s.changePct > 0 ? '+' : '';
      const barColor = s.confidenceColor || '#7c6fff';
      return `<tr>
        <td><strong>${s.symbol}</strong></td>
        <td>${s.name || '—'}</td>
        <td><span class="stock-category">${s.category || '—'}</span></td>
        <td class="${dir}">$${s.price || '—'}</td>
        <td class="${dir}">${sign}${s.changePct || 0}%</td>
        <td><span style="color:${barColor};font-weight:700">${s.confidence}</span></td>
        <td style="color:var(--text-muted)">${s.updatedAt || '—'}</td>
      </tr>`;
    }).join('');
  }
}

// ── 類股搜尋 ──
function quickSector(name) {
  document.getElementById('sectorInput').value = name;
  searchSector();
}

function searchSector() {
  const q = document.getElementById('sectorInput').value.trim();
  if (!q) return;

  const sectorData = {
    '低軌衛星': [
      { symbol: '6491', name: '晶碩', role: '光學元件', reason: '低軌衛星地面站鏡頭需求' },
      { symbol: '3714', name: '富采', role: 'LED/光電', reason: '衛星通訊指示燈需求' },
      { symbol: '4961', name: '天鈺', role: '電源IC', reason: '地面設備電源管理晶片' },
      { symbol: '6239', name: '力成', role: '封裝測試', reason: '衛星通訊晶片封裝' },
      { symbol: '3030', name: '晶豪科', role: 'DRAM', reason: '衛星通訊記憶體需求' },
    ],
    'AI伺服器': [
      { symbol: '2317', name: '鴻海', role: 'ODM組裝', reason: 'NVIDIA GPU伺服器最大組裝商' },
      { symbol: '3045', name: '台灣大', reason: 'AI雲端算力需求' },
      { symbol: '6669', name: '緯穎', role: 'ODM', reason: 'AWS/Meta AI伺服器主要供應商' },
      { symbol: '4938', name: '和碩', role: 'ODM', reason: 'AI PC + 伺服器布局' },
      { symbol: '3231', name: '緯創', role: 'ODM', reason: 'AI伺服器出貨放量' },
    ],
    '半導體': [
      { symbol: '2330', name: '台積電', role: '晶圓代工', reason: 'AI晶片3nm/2nm需求爆炸' },
      { symbol: '2303', name: '聯電', role: '成熟製程', reason: '車用/工業晶片景氣回升' },
      { symbol: '2308', name: '台達電', role: '電源模組', reason: 'AI伺服器電源需求' },
      { symbol: '2379', name: '瑞昱', role: '網路晶片', reason: '以太網路晶片需求強勁' },
      { symbol: '3711', name: '日月光投控', role: '封裝測試', reason: 'CoWoS先進封裝產能吃緊' },
    ],
    '電動車': [
      { symbol: '2603', name: '長榮', role: '汽車零件運輸', reason: '電動車出口量增' },
      { symbol: '1605', name: '華新', role: '電纜', reason: '充電樁/電動車線材需求' },
      { symbol: '6213', name: '聯茂', role: 'PCB', reason: '車用PCB供應商' },
      { symbol: '3557', name: '嘉澤', role: '連接器', reason: '電動車高速連接器' },
    ],
  };

  const data = sectorData[q];
  const el = document.getElementById('sectorResult');

  if (data) {
    el.innerHTML = `
      <div class="card">
        <div class="card-title">🔍 ${q} 台廠供應鏈</div>
        <table class="stock-table">
          <thead><tr>
            <th>代號</th><th>公司名稱</th><th>角色定位</th><th>為什麼漲</th><th>操作</th>
          </tr></thead>
          <tbody>
            ${data.map(s => `<tr>
              <td><strong>${s.symbol}</strong></td>
              <td>${s.name}</td>
              <td><span class="news-tag">${s.role || '—'}</span></td>
              <td style="color:var(--text-muted);font-size:13px">${s.reason || '—'}</td>
              <td><button onclick="addToWatchlist('${s.symbol}')" style="background:rgba(124,111,255,0.2);border:1px solid var(--accent);color:var(--accent);border-radius:6px;padding:4px 10px;cursor:pointer;font-size:12px">+ 追蹤</button></td>
            </tr>`).join('')}
          </tbody>
        </table>
        <div style="margin-top:16px;padding:12px;background:var(--surface2);border-radius:8px;font-size:13px;color:var(--text-muted)">
          💡 類股資料每日更新一次。即時行情追蹤請點「+ 追蹤」加入自選股。
        </div>
      </div>`;
  } else {
    el.innerHTML = `<div class="card">
      <div style="padding:20px;color:var(--text-muted);font-size:14px">
        📌 「${q}」尚未建立預設清單，跟老闆說「幫我查${q}相關台廠」，我來幫你整理並加進去。
      </div>
    </div>`;
  }
}

function addToWatchlist(symbol) {
  alert(`跟老闆說「幫我追蹤 ${symbol}」，我來幫你加進引擎設定 ✅`);
}

// ── 啟動 ──
loadDashboard();
// 開盤時每 5 分鐘自動刷新
setInterval(loadDashboard, 5 * 60 * 1000);
</script>
</body>
</html>
